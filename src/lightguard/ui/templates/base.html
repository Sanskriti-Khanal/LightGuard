<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{% block title %}LightGuard{% endblock %}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}" />
</head>
<body>

<div class="win">

  <!-- title bar -->
  <div class="titlebar">
    <div class="dots"><i></i><i></i><i></i></div>
    <div class="tb-title">LightGuard — localhost</div>
    <div class="tb-offline"><b></b> Running offline · nothing leaves this device</div>
  </div>

  <!-- sidebar -->
  <div class="rail">
    <div class="brand">
      <div class="mark"></div>
      <div><b>LightGuard</b><span>home protection</span></div>
    </div>

    <a class="nav{% if request.endpoint == 'dashboard' %} on{% endif %}" href="{{ url_for('dashboard') }}">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      Dashboard
    </a>

    <a class="nav{% if request.endpoint == 'scan_file' %} on{% endif %}" href="{{ url_for('scan_file') }}">
      <svg viewBox="0 0 24 24"><path d="M12 3v12m0 0 4-4m-4 4-4-4"/><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
      Scan a file
    </a>

    <a class="nav{% if request.endpoint == 'feed' %} on{% endif %}" href="{{ url_for('feed') }}">
      <svg viewBox="0 0 24 24"><circle cx="5" cy="19" r="2"/><path d="M4 4a16 16 0 0 1 16 16"/><path d="M4 11a9 9 0 0 1 9 9"/></svg>
      Live feed
    </a>

    <div class="spacer"></div>
    <div class="rail-foot">
      <p>Models run on this PC. No cloud lookups, no telemetry sent.</p>
    </div>
  </div>

  <!-- main content -->
  <div class="main">
    {% block content %}{% endblock %}
  </div>

</div>

{% block scripts %}{% endblock %}
</body>
</html>
